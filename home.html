<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jujutsu Kaisen | Bienvenida</title>

    <link rel="stylesheet" href="css/home.css">

    <meta name="color-scheme" content="dark light">
    <meta name="theme-color" content="#181818">
    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
</head>

<body>
    <div class="bg-glow" aria-hidden="true"></div>

    <section class="intro-panel" role="region" aria-label="Bienvenida a Jujutsu Kaisen Mission Management">
        <div class="panel-inner">
            <div class="panel-left">
                <img src="img/intro.png" alt="Ilustración de Jujutsu Kaisen" loading="eager" decoding="async" />
                <!-- Leyenda automática sobre la imagen -->
                <div class="media-caption" role="status" aria-live="polite">
                    <div class="caption-bubble" id="carouselCaption">Texto...</div>
                </div>
            </div>

            <div class="panel-right">
                <h1>¡Bienvenido!</h1>
                <h2>Sumérgete en el mundo de Jujutsu Kaisen. Explora a los personajes, descubre poderes y mucho más.</h2>

                <form id="loginForm">
                    <label for="username">Usuario:</label>
                    <input type="text" id="username" name="username" required>

                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" name="password" required>

                    <div class="login-actions">
                        <button type="submit" class="btn">Iniciar sección</button>
                        <button type="button" class="admin-btn" title="Administrador">
                            <img src="/img/admn.png" alt="Administrador" class="admin-img">
                        </button>
                        <span class="login-link">
                            ¿Aún sin registro? 
                            <a href="signup.html" style="color: var(--accent-2); text-decoration: underline;">
                                ¡Haz clic aquí!
                            </a>
                        </span>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!-- Modal para contraseña de administrador -->
    <div id="adminModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="adminModalTitle" aria-hidden="true">
        <div class="modal">
            <h3 id="adminModalTitle">Ingrese la contraseña de administrador</h3>
            <form id="adminModalForm">
                <label for="admin-password" class="visually-hidden">Contraseña de administrador</label>
                <input type="password" id="admin-password" name="admin-password" placeholder="Contraseña" autocomplete="current-password" required>
                <div class="modal-actions">
                    <button type="submit" id="admin-continue-btn" class="btn">Continuar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        window.addEventListener('wheel', function(e) {
            if ((e.ctrlKey && e.altKey) || e.ctrlKey) {
                e.preventDefault();
            }
        }, { passive: false });

        window.addEventListener('keydown', function(e) {
            if (e.ctrlKey && (e.key === '+' || e.key === '-' || e.key === '=' || e.key === '0')) {
                e.preventDefault();
            }
        });

        (function () {
            const form = document.getElementById('loginForm');

            form.addEventListener('submit', function (e) {
                e.preventDefault();
                document.body.classList.add('leaving');
                const DURATION = 520;

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, DURATION);
            });

            // Lógica del modal de administrador
            const adminBtn = document.querySelector('.admin-btn');
            const modalOverlay = document.getElementById('adminModal');
            const adminForm = document.getElementById('adminModalForm');
            const adminPasswordInput = document.getElementById('admin-password');

            function openAdminModal() {
                modalOverlay.classList.add('is-open');
                modalOverlay.setAttribute('aria-hidden', 'false');
                // Dar tiempo a pintar antes de enfocar
                setTimeout(() => adminPasswordInput.focus(), 50);
            }

            function closeAdminModal() {
                modalOverlay.classList.remove('is-open');
                modalOverlay.setAttribute('aria-hidden', 'true');
            }

            if (adminBtn) {
                adminBtn.addEventListener('click', openAdminModal);
            }

            // Cerrar si se hace click fuera del cuadro
            modalOverlay?.addEventListener('click', (ev) => {
                if (ev.target === modalOverlay) {
                    closeAdminModal();
                }
            });

            // Cerrar con ESC
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modalOverlay?.classList.contains('is-open')) {
                    closeAdminModal();
                }
            });

            // Enviar con Continuar (por ahora solo cierra el modal)
            adminForm?.addEventListener('submit', (e) => {
                e.preventDefault();
                // Aquí podrías validar y continuar a vista admin si corresponde
                closeAdminModal();
            });

            // --- Mini carrusel para el panel izquierdo ---
            const captions = [
                'Explora misiones, combates y maldiciones desde una sola interfaz.',
                'Asigna hechiceros según grado, técnica y experiencia.',
                'Registra exorcismos, daños y técnicas en cada misión.',
                'Analiza el rendimiento y la eficacia de cada hechicero.',
                'Supervisa traslados y refuerzos en tiempo real.',
                'Consulta el historial completo de maldiciones y enfrentamientos.',
            ];
            let idx = 0;
            const captionEl = document.getElementById('carouselCaption');

            const CAPTION_TRANS_MS = 420; // debe coincidir con CSS
            function renderCaption(i){
                if (!captionEl) return;
                captionEl.classList.remove('is-show');
                // Espera el desvanecimiento antes de cambiar el texto
                setTimeout(() => {
                    captionEl.textContent = captions[i];
                    captionEl.classList.add('is-show');
                }, CAPTION_TRANS_MS);
            }
            renderCaption(idx);
            const ROTATE_MS = 5000;
            setInterval(() => {
                idx = (idx + 1) % captions.length;
                renderCaption(idx);
            }, ROTATE_MS);
        })();
    </script>
</body>
</html>
