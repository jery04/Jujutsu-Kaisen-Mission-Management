<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultas Avanzadas | Jujutsu Kaisen</title>
    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
    <link rel="stylesheet" href="/css/index.css">

    <style>
        .btn-illustration {
            width: 45%;
            height: 100%;
            object-fit: cover;
        }
    </style>

</head>
<body>
    <header>
        <h1>Jujutsu Kaisen</h1>
        <p>Explora el universo de Jujutsu Kaisen con una plataforma que transforma la gestión de misiones y maldiciones en una experiencia estratégica y dinámica</p>
    </header>

    <main>
        <section class="btn-list" aria-label="Consultas avanzadas">
            <button class="btn">
                <span class="btn-content">
                    <img src="/img/query1.png" alt="icono" class="btn-icon" style="width:80px;height:80px;">
                    <span class="btn-text">
                        <h1>Consulta de Maldiciones por Estado</h1>
                        <p>Permitir consultar todas las maldiciones que se encuentren en cierto estado, mostrando su nombre, ubicación, grado y hechicero asignado.</p>
                    </span>
                </span>
                <img src="/img/part-query1.png" alt="Jujutsu Kaisen" class="btn-illustration">

            </button>
            <button class="btn">
                <span class="btn-content">
                    <img src="/img/query2.png" alt="icono" class="btn-icon" style="width:80px;height:80px;">
                    <span class="btn-text">
                        <h1>Misiones de un Hechicero</h1>
                        <p>Obtener el listado de todas las misiones en las que ha participado un hechicero específico, mostrando la fecha y el resultado de la misión.</p>
                    </span>
                </span>
                <img src="/img/part-query2.png" alt="Jujutsu Kaisen" class="btn-illustration">

            </button>
            <button class="btn">
                <span class="btn-content">
                    <img src="/img/query3.png" alt="icono" class="btn-icon" style="width:80px;height:80px;">
                    <span class="btn-text">
                        <h1>Misiones Exitosas por Rango de Fechas</h1>
                        <p>Consultar todas las misiones completadas con éxito en un rango de fechas específico, mostrando la ubicación, la maldición enfrentada, los hechiceros participantes y las técnicas utilizadas.</p>
                    </span>
                </span>
                <img src="/img/part-query3.png" alt="Jujutsu Kaisen" class="btn-illustration">

            </button>
            <button class="btn">
                <span class="btn-content">
                    <img src="/img/query4.png" alt="icono" class="btn-icon" style="width:80px;height:80px;">
                    <span class="btn-text">
                        <h1>Reporte de Efectividad de Técnicas</h1>
                        <p>Mostrar un reporte para cada hechicero que calcule el promedio de efectividad de sus técnicas utilizadas en combate, clasificando el resultado como Alta, Media o Baja según el promedio.</p>
                    </span>
                </span>
                <img src="/img/part-query4.png" alt="Jujutsu Kaisen" class="btn-illustration">

            </button>
            <button class="btn">
                <span class="btn-content">
                    <img src="/img/query5.png" alt="icono" class="btn-icon" style="width:80px;height:80px;">
                    <span class="btn-text">
                        <h1>Top Hechiceros por Nivel de Misión</h1>
                        <p>Listar para cada nivel de misión posible, los tres hechiceros con mayor porcentaje de éxito, mostrando el número total de misiones realizadas y el número de éxitos, condicionado por una región de acción.</p>
                    </span>
                </span>
                <img src="/img/part-query5.png" alt="Jujutsu Kaisen" class="btn-illustration">
            </button>
            <button class="btn">
                <span class="btn-content">
                    <img src="/img/query6.png" alt="icono" class="btn-icon" style="width:80px;height:80px;">
                    <span class="btn-text">
                        <h1>Relación de Hechiceros y Discípulos</h1>
                        <p>Establecer la relación de cada hechicero y sus discípulos o miembros de equipo, mostrando además el conteo de sus misiones exitosas y fallidas, ordenado de mayor a menor desempeño acorde al desempeño.</p>
                    </span>
                </span>
                <img src="/img/part-query6.png" alt="Jujutsu Kaisen" class="btn-illustration">
            </button>
            <button class="btn">
                <span class="btn-content">
                    <img src="/img/query7.png" alt="icono" class="btn-icon" style="width:80px;height:80px;">
                    <span class="btn-text">
                        <h1>Efectividad en Emergencias Críticas</h1>
                        <p>Determinar el porcentaje de efectividad de cada hechicero de grado medio en misiones de emergencia crítica que involucraron maldiciones de grado especial, y comparar este rendimiento con otros hechiceros</p>
                    </span>
                </span>
                <img src="/img/part-query7.png" alt="Jujutsu Kaisen" class="btn-illustration">
            </button>
        </section>
    </main>
    <script src="/js/queryplus.js"></script>
</body>
</html>
