<!-- Modal de Error de Tiempo Virtual -->
<div id="timeErrorModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="timeErrorTitle" aria-hidden="true">
    <div class="modal">
        <h3 id="timeErrorTitle">No se pudo avanzar el tiempo</h3>
        <p id="timeErrorMessage">Solo se permite avanzar hacia el futuro</p>
        <div class="modal-actions">
            <button type="button" id="time-error-close" class="btn" aria-label="Cerrar aviso">Aceptar</button>
        </div>
    </div>
</div>
