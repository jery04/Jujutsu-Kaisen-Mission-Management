<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/query.css">

</head>
<body>
    <header>
        <h1>Jujutsu Kaisen</h1>
    </header>
    
    <main>
        <div class="title">
            <h2>Consulta de Entidades</h2>
            <p>Aquí podrás visualizar, modificar y administrar integralmente las entidades registradas en el sistema.</p>
        </div>

        <section class="query-section">
            <div class = "btn-group">
                <button id="sorcerers" class="btn-action">Hechiceros</button>
                <button id="techniques" class="btn-action">Técnicas</button>
                <button id="curses" class="btn-action">Maldiciones</button>
            </div>
            <div id="results" class="results-container">
                <!-- Los resultados de la consulta se mostrarán aquí -->
                <div class = "query-item">
                    <h3>Entidad de Ejemplo</h3>

                    <div class = "btn-detail">
                        <button class="icon-btn btn-edit" aria-label="Editar">
                            <img src="/img/editar.png" alt="Editar" class="icon">
                        </button>
                        <button class="icon-btn btn-delete" aria-label="Eliminar">
                            <img src="/img/remove.png" alt="Eliminar" class="icon">
                        </button>
                    </div>
                </div>

                <div class = "query-item">
                    <h3>Entidad de Ejemplo</h3>

                    <div class = "btn-detail">
                        <button class="icon-btn btn-edit" aria-label="Editar">
                            <img src="/img/editar.png" alt="Editar" class="icon">
                        </button>
                        <button class="icon-btn btn-delete" aria-label="Eliminar">
                            <img src="/img/remove.png" alt="Eliminar" class="icon">
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
