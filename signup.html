<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/signup.css">
</head>
<body>
    <main>
        <div class="signup-container">
            <form class="signup-box" action="#" method="post" novalidate>
                <h2>Registrar usuario</h2>

                <div class="form-field">
                    <label for="name">Nombre</label>
                    <input type="text" id="name" name="name" placeholder="Ingresa el nombre" required>
                </div>

                <div class="form-field">
                    <label for="rank">Jerarquía</label>
                    <select id="rank" name="rank" required>
                        <option value="grado-especial">grado especial</option>
                        <option value="alto">alto</option>
                        <option value="medio">medio</option>
                        <option value="bajo">bajo</option>
                    </select>
                </div>

                <div class="form-field">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="Contraseña" required>
                </div>

                <div class="form-field">
                    <label for="admin-password">Contraseña de administrador</label>
                    <input type="password" id="admin-password" name="admin-password" placeholder="Contraseña de administrador (si aplica)">
                </div>

                <div class="form-actions">
                    <button class="btn-register" type="submit">Registrar</button>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
