<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio | Jujutsu Kaisen</title>
    <link rel="icon" type="image/svg+xml" href="/img/favicon.svg">
    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="./css/signup.css">
</head>
<body>
    <header>
        <h1>Jujutsu Kaisen</h1>
        <p>Explora el universo de Jujutsu Kaisen con una plataforma que transforma la gestión de misiones y maldiciones en una experiencia estratégica y dinámica</p>
        <div class="advance-block" aria-label="Control de tiempo virtual">
            <label id="virtual-time-label" for="advance-target">Cargando tiempo virtual…</label>
            <input id="advance-target" type="datetime-local" />
            <button id="advance-btn" type="button">Adelantar</button>
        </div>
    </header>
    
    <main id="main-content">
        <section class="user-center" aria-label="Usuario y sesión">
            <div class="user-badge" id="user-badge" aria-live="polite">
                <div class="avatar" id="user-avatar" aria-hidden="true">U</div>
                <span class="username" id="user-name">Usuario</span>
            </div>
            <button id="btn-logout" class="logout-btn" type="button" title="Cerrar sesión">Cerrar sesión</button>
        </section>

        <section class="btn-list" aria-label="Lista de botones">
            <button id="open-add" class="btn">
                <span class="btn-content">
                    <img src="/img/historias.png" alt="icono" class="btn-icon">
                    <span class="btn-text">
                        <h1>Añadir Entidades</h1>
                        <p>Instanciación de entidades como hechiceros, técnicas malditas y maldiciones, con sus respectivos campos</p>
                    </span>
                </span>
                <img src="/img/part1.png" alt="Jujutsu Kaisen" class="btn-illustration">
            </button>

            <button id="open-query" class ="btn">
                <span class="btn-content">
                    <img src="/img/libro.png" alt="icono" class="btn-icon">
                    <span class="btn-text">
                        <h1>Consultas Básicas</h1>
                        <p>Visualización, modificación y administración integral de las entidades registradas</p>
                    </span>
                </span>
                <img src="/img/part2.png" alt="Jujutsu Kaisen" class="btn-illustration">
            </button>
            
            <button id="open-queryplus" class="btn">
                <span class="btn-content">
                    <img src="/img/consultas.png" alt="icono" class="btn-icon">
                    <span class="btn-text">
                        <h1>Consultas Avanzadas</h1>
                        <p>Consulta reportes avanzados, así como información detallada de las entidades. Analiza el rendimiento de hechiceros y equipos.</p>
                    </span>
                </span>
                <img src="/img/part3.png" alt="Jujutsu Kaisen" class="btn-illustration">
            </button>

            <button id="open-tutorial" class="btn">
                <span class="btn-content">
                    <img src="/img/tutorial.png" alt="icono" class="btn-icon">
                    <span class="btn-text">
                        <h1>Tutorial</h1>
                        <p>Descubre todo lo que puedes hacer como usuario en nuestro sitio web. Tu guía práctica para sacar el mejor provecho de cada sección</p>
                    </span>
                </span>
                <img src="/img/part4.png" alt="Jujutsu Kaisen" class="btn-illustration">
            </button>
        </section>
    </main>

    <script src="/js/utils/time.js"></script>
    <script src="/js/utils/auth.js"></script>
    <script src="./js/index.js"></script>
</body>
</html>
