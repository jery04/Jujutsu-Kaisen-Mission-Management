<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jujutsu Kaisen | Bienvenida</title>
    <style>
        :root {
            --bg: #181818;
            --panel: rgba(255, 255, 255, 0.06);
            --panel-stroke: rgba(255, 255, 255, 0.12);
            --text: #f5f7fb;
            --muted: #c8cbd4;
            --accent: #e0245e; /* rojizo maldición */
            --accent-2: #00d1ff; /* azul técnica */
            --radius: 18px;
            --shadow: 0 10px 30px rgba(0,0,0,.45);
        }

        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
            line-height: 1.5;
            overflow: hidden; /* foco total en la intro */
        }

        /* Fondo épico con gradientes animados */
        .bg-glow {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(1200px 600px at 80% 20%, rgba(224, 36, 94, .25), transparent 60%),
                radial-gradient(900px 500px at 10% 80%, rgba(0, 209, 255, .25), transparent 60%),
                radial-gradient(800px 800px at 50% 50%, rgba(255,255,255,.06), transparent 60%);
            filter: saturate(110%);
            pointer-events: none;
            animation: pulse 14s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: .9; }
            50% { transform: scale(1.03); opacity: 1; }
        }

        /* Panel inferior centrado y pegado abajo */
        .intro-panel {
            position: fixed;
            left: 50%;
            bottom: 0; /* pegado abajo */
            transform: translateX(-50%);
            width: min(900px, 86vw);
            height: clamp(520px, 70vh, 800px); /* sección más alta */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
            border: 1px solid var(--panel-stroke);
            border-bottom: none;
            border-radius: var(--radius) var(--radius) 0 0;
            box-shadow: var(--shadow);
        }

        .panel-inner {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 28px;
            align-items: stretch;
            padding: 26px 26px 22px 22px;
            min-height: 100%; /* que ocupe toda la altura del panel */
        }

        .panel-left {
            position: relative;
            border-radius: calc(var(--radius) - 6px);
            overflow: hidden;
            border: 1px solid var(--panel-stroke);
            background: var(--panel);
            min-height: 520px; /* contenedor padre más alto */
        }
        .panel-left img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* llenar completamente el contenedor */
            object-position: center;
            filter: contrast(105%) saturate(110%);
        }

        .panel-right {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 10px;
            padding: 8px 4px 8px 2px;
        }

        h1 {
            margin: 0;
            font-size: clamp(28px, 4vw, 42px);
            letter-spacing: 0.4px;
            line-height: 1.1;
            text-shadow: 0 2px 20px rgba(0,0,0,.35);
        }

        h2 {
            margin: 0;
            font-weight: 500;
            color: var(--muted);
            font-size: clamp(16px, 2.2vw, 20px);
        }

        .features {
            margin: 6px 0 6px;
            display: grid;
            grid-template-columns: repeat(2, minmax(220px, 1fr));
            gap: 8px 18px;
            padding: 0;
            list-style: none;
        }
        .features li::before {
            content: "";
            display: inline-block;
            width: 9px; height: 9px;
            margin-right: 10px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, var(--accent-2), var(--accent));
            box-shadow: 0 0 10px rgba(0, 209, 255, .6);
        }
        .features a {
            color: var(--text);
            text-decoration: none;
        }
        .features a:hover {
            text-decoration: underline;
        }

        .actions {
            margin-top: 6px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, var(--accent), #b31249 60%);
            color: white;
            border: none;
            border-radius: 999px;
            padding: 12px 22px;
            font-weight: 600;
            letter-spacing: .3px;
            text-decoration: none;
            box-shadow: 0 8px 22px rgba(224, 36, 94, .35);
            transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(224,36,94,.5); filter: saturate(115%); }
        .btn:active { transform: translateY(0); }

        /* Responsivo */
        @media (max-width: 940px) {
            .intro-panel { height: clamp(460px, 68vh, 720px); }
            .panel-inner {
                grid-template-columns: 1fr;
                gap: 16px;
                padding: 18px 16px 16px 16px;
            }
            .panel-left { min-height: 320px; }
            .features { grid-template-columns: 1fr; }
        }

        /* Línea superior de energía */
        .intro-panel::before {
            content: "";
            position: absolute;
            left: 0; right: 0; top: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-2), var(--accent), transparent);
            opacity: .9;
            filter: blur(.2px);
        }

        /* Transición de salida hacia index.html */
        .leaving .intro-panel {
            animation: slideOutDown 500ms cubic-bezier(.22,.61,.36,1) forwards;
        }
        .leaving .bg-glow {
            animation: fadeOut 450ms ease forwards;
        }
        @keyframes slideOutDown {
            0% { transform: translate(-50%, 0); opacity: 1; }
            100% { transform: translate(-50%, 110%); opacity: 0; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        @media (prefers-reduced-motion: reduce) {
            .leaving .intro-panel, .leaving .bg-glow { animation: none !important; }
        }
    </style>
    <meta name="color-scheme" content="dark light">
    <meta name="theme-color" content="#181818">
    <link rel="icon" href="img/part1.png">
</head>
<body>
    <div class="bg-glow" aria-hidden="true"></div>

    <section class="intro-panel" role="region" aria-label="Bienvenida a Jujutsu Kaisen Mission Management">
        <div class="panel-inner">
            <div class="panel-left">
                <!-- Reemplaza la imagen si deseas otra: coloca el archivo en /img y cambia la ruta -->
                <img src="img/intro.png" alt="Ilustración de Jujutsu Kaisen" loading="eager" decoding="async" />
            </div>
            <div class="panel-right">
                <h1>¡Bienvenido!</h1>
                <h2>Sumérgete en el mundo de Jujutsu Kaisen. Explora a los personajes, descubre poderes y mucho más.</h2>

                <ul class="features">
                    <li>Explorar el tablero principal</li>
                    <li>Agregar personajes, misiones y técnicas</li>
                    <li>Consultar y filtrar registros</li>
                    <li>Crear una cuenta y empezar</li>
                </ul>

                <div class="actions">
                    <a class="btn" href="index.html" aria-label="Empezar ahora">Empezar</a>
                </div>
            </div>
        </div>
    </section>
    <script>
        (function () {
            const btn = document.querySelector('.btn[href="index.html"]');
            if (!btn) return;

            btn.addEventListener('click', function (e) {
                // Permitir nuevo tab/ventana o click con modificadores
                if (e.ctrlKey || e.metaKey || e.shiftKey || e.altKey || this.target === '_blank') return;
                e.preventDefault();

                const href = this.getAttribute('href');

                // Si el usuario prefiere reducir movimiento, navegar inmediato
                if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                    window.location.href = href;
                    return;
                }

                // Activar animación de salida
                document.body.classList.add('leaving');
                this.setAttribute('aria-busy', 'true');
                this.style.pointerEvents = 'none';

                // Navegar al finalizar la animación (fallback por tiempo)
                const DURATION = 520; // ms, debe coincidir con la animación CSS
                setTimeout(() => { window.location.href = href; }, DURATION);
            }, { passive: false });
        })();
    </script>
</body>
</html>
